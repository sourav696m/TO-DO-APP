<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
  <title>Simple To Do App in JavaScript | Free Task Manager</title>

<meta name="description" content="Free simple To Do App made with JavaScript. Manage your daily tasks easily online.">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LEFT -->
<div class="left" id="appPanel">
  <div class="plus" onclick="addApp()">+</div>
</div>

<!-- CENTER -->
<div class="center">
  <h2>TASK DASHBOARD</h2>
  <div>
    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
  </div>
</div>

<!-- RIGHT -->
<div class="right" id="board" style="color: white;">
  No Task Yet
</div>
<!-- APP ADD MODAL -->
<div id="appModal" class="modal">
  <div class="modalBox">
    <h3>Add App</h3>

    <input id="appName" placeholder="App Name">
    <input id="appUrl" placeholder="App URL (https://...)">

    <button onclick="saveApp()">Add</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>
<div class="topReset" onclick="resetTasks()">
  <div class="resetCircle">🔄</div>
  <span>Restart</span>
</div>

<script src="script.js"></script>
</body>
</html>
